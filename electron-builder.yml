appId: com.zkidzdev.claudewatch
productName: ClaudeWatch
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
  - node_modules/**/*
  - '!node_modules/lucide-react/**/*'
  - '!**/node_modules/**/*.js.map'
  - '!**/node_modules/**/*.d.ts'
  - '!**/node_modules/**/*.d.cts'
  - '!**/node_modules/**/*.d.mts'
  - '!**/node_modules/**/README*'
  - '!**/node_modules/**/CHANGELOG*'
  - '!**/node_modules/**/LICENSE*'
  - '!**/node_modules/**/.github/**'
afterPack: scripts/afterSign.js
mac:
  artifactName: '${name}-${version}-${arch}.${ext}'
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  extraFiles:
    - from: build/widget/ClaudeWatchWidgetExtension.appex
      to: PlugIns/ClaudeWatchWidgetExtension.appex
  extraResources:
    - from: resources/sounds
      to: sounds
win:
  artifactName: '${name}-${version}-setup.${ext}'
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  artifactName: '${name}-${version}-${arch}.${ext}'
  target:
    - AppImage
  category: Utility
publish:
  provider: github
  owner: theangeloumali
  repo: ClaudeWatch
  releaseType: release
releaseInfo:
  releaseNotesFile: release-notes.md
